<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CRM Magasins</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f5f7;
      color: #111827;
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 26px;
    }

    h1, h2, h3 {
      margin: 0;
    }

    .subtitle {
      color: #6b7280;
      margin-top: 6px;
    }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 30px;
    }

    .commercial-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 28px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      transition: 0.2s;
    }

    .commercial-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    }

    .commercial-card h2 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .filters {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .filters-row-2 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    input, select, textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      background: white;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #374151;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 15px;
      font-size: 14px;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    button:hover {
      background: #374151;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .btn-light {
      background: white;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    .btn-light:hover {
      background: #f3f4f6;
    }

    .btn-danger {
      background: #b91c1c;
      color: white;
    }

    .btn-danger:hover {
      background: #991b1b;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .store-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .store-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .store-card:hover {
      border-color: #111827;
      transform: translateY(-2px);
    }

    .store-name {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 8px;
    }

    .store-meta {
      color: #6b7280;
      font-size: 13px;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      margin-top: 10px;
    }

    .badge-green {
      background: #dcfce7;
      color: #166534;
    }

    .badge-gray {
      background: #f3f4f6;
      color: #374151;
    }

    .badge-orange {
      background: #ffedd5;
      color: #9a3412;
    }

    .badge-red {
      background: #fee2e2;
      color: #991b1b;
    }

    .alert-box {
      margin-top: 18px;
      padding: 13px;
      border-radius: 12px;
      font-weight: bold;
    }

    .alert-orange {
      background: #ffedd5;
      color: #9a3412;
      border: 1px solid #fed7aa;
    }

    .alert-red {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }

    .photo-box {
      width: 100%;
      height: 260px;
      border-radius: 16px;
      overflow: hidden;
      background: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #6b7280;
      text-align: center;
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .info-item {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 13px;
    }

    .info-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 5px;
    }

    .info-value {
      font-weight: bold;
    }

    .visit-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .visit-item {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }

    .visit-date {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .modal {
      background: white;
      width: 100%;
      max-width: 760px;
      border-radius: 18px;
      padding: 24px;
      max-height: 92vh;
      overflow: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .message {
      margin-top: 12px;
      font-size: 14px;
    }

    .success {
      color: #166534;
      background: #dcfce7;
      padding: 10px;
      border-radius: 10px;
    }

    .error {
      color: #991b1b;
      background: #fee2e2;
      padding: 10px;
      border-radius: 10px;
    }

    .empty {
      color: #6b7280;
      padding: 24px;
      text-align: center;
    }

    .stats-line {
      margin-top: 14px;
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .home-grid,
      .store-grid,
      .detail-layout,
      .filters,
      .filters-row-2,
      .form-grid,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app"></div>

  <div class="modal-bg" id="storeModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="storeModalTitle">Ajouter une fiche client</h2>
        <button class="btn-secondary" onclick="closeStoreModal()">Fermer</button>
      </div>

      <form id="storeForm">
        <div class="form-grid">
          <div class="full">
            <label>Nom du magasin / client</label>
            <input id="storeName" required />
          </div>

          <div>
            <label>Enseigne</label>
            <input id="storeEnseigne" placeholder="Ex : Carrefour, Proxi, Vival..." />
          </div>

          <div>
            <label>Nom du gérant</label>
            <input id="storeGerant" placeholder="Nom du gérant" />
          </div>

          <div>
            <label>Ville</label>
            <input id="storeCity" />
          </div>

          <div>
            <label>Adresse</label>
            <input id="storeAddress" />
          </div>

          <div>
            <label>Prix de vente du magasin</label>
            <input id="storePrice" type="number" step="0.01" />
          </div>

          <div>
            <label>CA HT</label>
            <input id="storeCA" type="number" step="0.01" />
          </div>

          <div>
            <label>CA EDP</label>
            <input id="storeCAEDP" type="number" step="0.01" />
          </div>

          <div>
            <label>Date de signature du contrat</label>
            <input id="storeSignature" type="date" />
          </div>

          <div>
            <label>Durée du contrat</label>
            <select id="storeContractDuration">
              <option value="1">1 an</option>
              <option value="2">2 ans</option>
              <option value="3">3 ans</option>
              <option value="4">4 ans</option>
              <option value="5">5 ans</option>
              <option value="6">6 ans</option>
              <option value="7" selected>7 ans</option>
              <option value="8">8 ans</option>
              <option value="9">9 ans</option>
              <option value="10">10 ans</option>
            </select>
          </div>

          <div class="full">
            <label>Photo du magasin</label>
            <input id="storePhoto" type="file" accept="image/*" />
          </div>
        </div>

        <div class="actions" style="margin-top:18px;">
          <button type="submit">Enregistrer</button>
          <button type="button" class="btn-secondary" onclick="closeStoreModal()">Annuler</button>
        </div>

        <div id="storeFormMessage" class="message"></div>
      </form>
    </div>
  </div>

  <div class="modal-bg" id="visitModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Ajouter une visite</h2>
        <button class="btn-secondary" onclick="closeVisitModal()">Fermer</button>
      </div>

      <form id="visitForm">
        <div class="form-grid">
          <div>
            <label>Date de visite</label>
            <input id="visitDate" type="date" required />
          </div>

          <div class="full">
            <label>Commentaire</label>
            <textarea id="visitComment" placeholder="Compte-rendu de visite, remarques, actions à prévoir..."></textarea>
          </div>
        </div>

        <div class="actions" style="margin-top:18px;">
          <button type="submit">Ajouter la visite</button>
          <button type="button" class="btn-secondary" onclick="closeVisitModal()">Annuler</button>
        </div>

        <div id="visitFormMessage" class="message"></div>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://nnbmbpycmhqvrzcszbkz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_slPyRsJhGZbUZT5rJ1Zf1A_amrs3G8F";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const commerciaux = [
      { id: "laurent-page", nom: "Laurent Page" },
      { id: "jerome-gigmes", nom: "Jérôme Gigmes" },
      { id: "laurent-pizzolato", nom: "Laurent Pizzolato" }
    ];

    let currentCommercial = null;
    let magasins = [];
    let visites = [];
    let selectedMagasin = null;
    let editingMagasin = null;

    const app = document.getElementById("app");

    const filters = {
      search: "",
      ville: "",
      enseigne: "",
      contrat: "",
      caMin: "",
      caMax: "",
      caEdpMin: "",
      caEdpMax: ""
    };

    function formatMoney(value) {
      if (value === null || value === undefined || value === "") return "Non renseigné";

      return Number(value).toLocaleString("fr-FR", {
        style: "currency",
        currency: "EUR",
        maximumFractionDigits: 0
      });
    }

    function formatDate(date) {
      if (!date) return "Non renseigné";
      return new Date(date + "T00:00:00").toLocaleDateString("fr-FR");
    }

    function normalizeText(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function getContractDuration(value) {
      const duration = Number(value);

      if (!Number.isFinite(duration)) return 7;
      if (duration < 1) return 1;
      if (duration > 10) return 10;

      return duration;
    }

    function addYears(date, years) {
      const newDate = new Date(date);
      newDate.setFullYear(newDate.getFullYear() + years);
      return newDate;
    }

    function subtractMonths(date, months) {
      const newDate = new Date(date);
      newDate.setMonth(newDate.getMonth() - months);
      return newDate;
    }

    function getContractInfo(dateSignature, dureeContrat) {
      if (!dateSignature) {
        return {
          hasContract: false,
          duration: getContractDuration(dureeContrat),
          endDate: null,
          alertDate: null,
          isAlert: false,
          isExpired: false,
          message: "Contrat non signé"
        };
      }

      const duration = getContractDuration(dureeContrat);
      const signatureDate = new Date(dateSignature + "T00:00:00");
      const endDate = addYears(signatureDate, duration);
      const alertDate = subtractMonths(endDate, 8);
      const today = new Date();

      today.setHours(0, 0, 0, 0);

      const isAlert = today >= alertDate && today < endDate;
      const isExpired = today >= endDate;

      let message = `Contrat valable ${duration} an(s), jusqu’au ${endDate.toLocaleDateString("fr-FR")}`;

      if (isExpired) {
        message = `Contrat terminé depuis le ${endDate.toLocaleDateString("fr-FR")}`;
      } else if (isAlert) {
        message = `Contrat à renouveler : fin prévue le ${endDate.toLocaleDateString("fr-FR")}`;
      }

      return {
        hasContract: true,
        duration,
        endDate,
        alertDate,
        isAlert,
        isExpired,
        message
      };
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getLatestVisit(magasinId) {
      const related = visites
        .filter(v => v.magasin_id === magasinId)
        .sort((a, b) => new Date(b.date_visite) - new Date(a.date_visite));

      return related[0] || null;
    }

    function renderHome() {
      currentCommercial = null;
      selectedMagasin = null;

      app.innerHTML = `
        <div class="topbar">
          <div>
            <h1>CRM Magasins</h1>
            <p class="subtitle">Choisis un commercial pour accéder à ses magasins.</p>
          </div>
        </div>

        <div class="home-grid">
          ${commerciaux.map(c => `
            <div class="commercial-card" data-commercial="${c.id}">
              <h2>${escapeHTML(c.nom)}</h2>
              <p class="subtitle">Accéder à l’espace commercial</p>
            </div>
          `).join("")}
        </div>
      `;

      document.querySelectorAll("[data-commercial]").forEach(card => {
        card.addEventListener("click", () => {
          const id = card.dataset.commercial;
          currentCommercial = commerciaux.find(c => c.id === id);
          loadDashboard();
        });
      });
    }

    async function loadDashboard() {
      app.innerHTML = `<div class="card"><p>Chargement des magasins...</p></div>`;

      const { data, error } = await supabase
        .from("magasins")
        .select("*")
        .eq("commercial_id", currentCommercial.id)
        .eq("archive", false)
        .order("created_at", { ascending: false });

      if (error) {
        app.innerHTML = `<div class="error">Erreur chargement magasins : ${escapeHTML(error.message)}</div>`;
        return;
      }

      magasins = data || [];

      if (magasins.length > 0) {
        const ids = magasins.map(m => m.id);

        const { data: visitesData, error: visitesError } = await supabase
          .from("visites")
          .select("*")
          .in("magasin_id", ids)
          .order("date_visite", { ascending: false });

        if (visitesError) {
          app.innerHTML = `<div class="error">Erreur chargement visites : ${escapeHTML(visitesError.message)}</div>`;
          return;
        }

        visites = visitesData || [];
      } else {
        visites = [];
      }

      renderDashboard();
    }

    function getFilteredMagasins() {
      return magasins.filter(m => {
        const search = normalizeText(filters.search);

        const matchSearch =
          !search ||
          normalizeText(m.nom).includes(search) ||
          normalizeText(m.ville).includes(search) ||
          normalizeText(m.adresse).includes(search) ||
          normalizeText(m.enseigne).includes(search) ||
          normalizeText(m.gerant).includes(search);

        const matchVille = !filters.ville || m.ville === filters.ville;
        const matchEnseigne = !filters.enseigne || m.enseigne === filters.enseigne;

        const contractInfo = getContractInfo(m.date_signature, m.duree_contrat);

        const matchContrat =
          !filters.contrat ||
          (filters.contrat === "signe" && m.date_signature) ||
          (filters.contrat === "non-signe" && !m.date_signature) ||
          (filters.contrat === "alerte" && contractInfo.isAlert) ||
          (filters.contrat === "termine" && contractInfo.isExpired);

        const ca = Number(m.ca || 0);
        const caEdp = Number(m.ca_edp || 0);

        const matchCaMin = !filters.caMin || ca >= Number(filters.caMin);
        const matchCaMax = !filters.caMax || ca <= Number(filters.caMax);

        const matchCaEdpMin = !filters.caEdpMin || caEdp >= Number(filters.caEdpMin);
        const matchCaEdpMax = !filters.caEdpMax || caEdp <= Number(filters.caEdpMax);

        return (
          matchSearch &&
          matchVille &&
          matchEnseigne &&
          matchContrat &&
          matchCaMin &&
          matchCaMax &&
          matchCaEdpMin &&
          matchCaEdpMax
        );
      });
    }

    function renderDashboard() {
      const villes = [...new Set(magasins.map(m => m.ville).filter(Boolean))].sort();
      const enseignes = [...new Set(magasins.map(m => m.enseigne).filter(Boolean))].sort();

      app.innerHTML = `
        <div class="topbar">
          <div>
            <h1>${escapeHTML(currentCommercial.nom)}</h1>
            <p class="subtitle" id="dashboardSubtitle">${magasins.length} magasin(s) enregistré(s)</p>
          </div>

          <div class="actions">
            <button class="btn-light" id="backHomeBtn">Retour accueil</button>
            <button class="btn-secondary" id="exportBtn">Exporter CSV</button>
            <button id="addStoreBtn">+ Ajouter une fiche client</button>
          </div>
        </div>

        <div class="card">
          <h2>Recherche et filtres</h2>

          <div class="filters" style="margin-top:16px;">
            <input id="filterSearch" placeholder="Rechercher magasin, enseigne, gérant, ville, adresse..." value="${escapeHTML(filters.search)}" />

            <select id="filterVille">
              <option value="">Toutes les villes</option>
              ${villes.map(v => `<option value="${escapeHTML(v)}" ${filters.ville === v ? "selected" : ""}>${escapeHTML(v)}</option>`).join("")}
            </select>

            <select id="filterEnseigne">
              <option value="">Toutes les enseignes</option>
              ${enseignes.map(e => `<option value="${escapeHTML(e)}" ${filters.enseigne === e ? "selected" : ""}>${escapeHTML(e)}</option>`).join("")}
            </select>

            <select id="filterContrat">
              <option value="">Tous les contrats</option>
              <option value="signe" ${filters.contrat === "signe" ? "selected" : ""}>Contrat signé</option>
              <option value="non-signe" ${filters.contrat === "non-signe" ? "selected" : ""}>Non signé</option>
              <option value="alerte" ${filters.contrat === "alerte" ? "selected" : ""}>À renouveler</option>
              <option value="termine" ${filters.contrat === "termine" ? "selected" : ""}>Contrat terminé</option>
            </select>
          </div>

          <div class="filters-row-2">
            <input id="filterCaMin" type="number" placeholder="CA HT min" value="${escapeHTML(filters.caMin)}" />
            <input id="filterCaMax" type="number" placeholder="CA HT max" value="${escapeHTML(filters.caMax)}" />
            <input id="filterCaEdpMin" type="number" placeholder="CA EDP min" value="${escapeHTML(filters.caEdpMin)}" />
            <input id="filterCaEdpMax" type="number" placeholder="CA EDP max" value="${escapeHTML(filters.caEdpMax)}" />
          </div>

          <div class="actions" style="margin-top:14px;">
            <button class="btn-light" id="resetFiltersBtn">Réinitialiser les filtres</button>
          </div>

          <div class="stats-line" id="filterStats"></div>
        </div>

        <div class="store-grid" id="storeGrid"></div>
      `;

      document.getElementById("backHomeBtn").addEventListener("click", renderHome);
      document.getElementById("addStoreBtn").addEventListener("click", () => openStoreModal());
      document.getElementById("exportBtn").addEventListener("click", exportFilteredCSV);
      document.getElementById("resetFiltersBtn").addEventListener("click", resetFilters);

      document.getElementById("filterSearch").addEventListener("input", e => {
        filters.search = e.target.value;
        renderStoreGrid();
      });

      document.getElementById("filterVille").addEventListener("change", e => {
        filters.ville = e.target.value;
        renderStoreGrid();
      });

      document.getElementById("filterEnseigne").addEventListener("change", e => {
        filters.enseigne = e.target.value;
        renderStoreGrid();
      });

      document.getElementById("filterContrat").addEventListener("change", e => {
        filters.contrat = e.target.value;
        renderStoreGrid();
      });

      document.getElementById("filterCaMin").addEventListener("input", e => {
        filters.caMin = e.target.value;
        renderStoreGrid();
      });

      document.getElementById("filterCaMax").addEventListener("input", e => {
        filters.caMax = e.target.value;
        renderStoreGrid();
      });

      document.getElementById("filterCaEdpMin").addEventListener("input", e => {
        filters.caEdpMin = e.target.value;
        renderStoreGrid();
      });

      document.getElementById("filterCaEdpMax").addEventListener("input", e => {
        filters.caEdpMax = e.target.value;
        renderStoreGrid();
      });

      renderStoreGrid();
    }

    function renderStoreGrid() {
      const filtered = getFilteredMagasins();
      const storeGrid = document.getElementById("storeGrid");
      const filterStats = document.getElementById("filterStats");
      const dashboardSubtitle = document.getElementById("dashboardSubtitle");

      if (!storeGrid) return;

      if (dashboardSubtitle) {
        dashboardSubtitle.textContent = `${magasins.length} magasin(s) enregistré(s)`;
      }

      if (filterStats) {
        filterStats.textContent = `${filtered.length} résultat(s) affiché(s) sur ${magasins.length} magasin(s).`;
      }

      storeGrid.innerHTML = `
        ${
          filtered.length === 0
            ? `<div class="card empty">Aucun magasin ne correspond à ta recherche.</div>`
            : filtered.map(m => {
                const latestVisit = getLatestVisit(m.id);
                const contractInfo = getContractInfo(m.date_signature, m.duree_contrat);

                let badgeClass = "badge-gray";
                let badgeText = "Contrat non signé";

                if (contractInfo.isExpired) {
                  badgeClass = "badge-red";
                  badgeText = "Contrat terminé";
                } else if (contractInfo.isAlert) {
                  badgeClass = "badge-orange";
                  badgeText = "Contrat à renouveler";
                } else if (m.date_signature) {
                  badgeClass = "badge-green";
                  badgeText = "Contrat signé";
                }

                return `
                  <div class="store-card" data-store="${m.id}">
                    <div class="store-name">${escapeHTML(m.nom)}</div>
                    <div class="store-meta">
                      Enseigne : ${escapeHTML(m.enseigne || "Non renseignée")}<br>
                      Gérant : ${escapeHTML(m.gerant || "Non renseigné")}<br>
                      Ville : ${escapeHTML(m.ville || "Non renseignée")}<br>
                      CA HT : ${formatMoney(m.ca)}<br>
                      CA EDP : ${formatMoney(m.ca_edp)}<br>
                      Dernière visite : ${latestVisit ? formatDate(latestVisit.date_visite) : "Aucune visite"}<br>
                      ${contractInfo.endDate ? `Fin contrat : ${contractInfo.endDate.toLocaleDateString("fr-FR")}` : ""}
                    </div>
                    <span class="badge ${badgeClass}">
                      ${badgeText}
                    </span>
                  </div>
                `;
              }).join("")
        }
      `;

      document.querySelectorAll("[data-store]").forEach(card => {
        card.addEventListener("click", () => {
          selectedMagasin = magasins.find(m => m.id === card.dataset.store);
          renderMagasinDetail();
        });
      });
    }

    function resetFilters() {
      filters.search = "";
      filters.ville = "";
      filters.enseigne = "";
      filters.contrat = "";
      filters.caMin = "";
      filters.caMax = "";
      filters.caEdpMin = "";
      filters.caEdpMax = "";

      renderDashboard();
    }

    function csvValue(value) {
      const text = String(value ?? "").replaceAll('"', '""');
      return `"${text}"`;
    }

    function exportFilteredCSV() {
      const filtered = getFilteredMagasins();

      if (filtered.length === 0) {
        alert("Aucun résultat à exporter.");
        return;
      }

      const headers = [
        "Commercial",
        "Nom magasin",
        "Enseigne",
        "Nom du gérant",
        "Ville",
        "Adresse",
        "Prix de vente",
        "CA HT",
        "CA EDP",
        "Date signature",
        "Durée contrat",
        "Date fin contrat",
        "Date alerte renouvellement",
        "Statut contrat",
        "Dernière visite",
        "Commentaire dernière visite",
        "Nombre de visites"
      ];

      const rows = filtered.map(m => {
        const contractInfo = getContractInfo(m.date_signature, m.duree_contrat);
        const latestVisit = getLatestVisit(m.id);
        const visitCount = visites.filter(v => v.magasin_id === m.id).length;

        return [
          currentCommercial.nom,
          m.nom || "",
          m.enseigne || "",
          m.gerant || "",
          m.ville || "",
          m.adresse || "",
          m.prix_vente || "",
          m.ca || "",
          m.ca_edp || "",
          m.date_signature || "",
          `${getContractDuration(m.duree_contrat)} an(s)`,
          contractInfo.endDate ? contractInfo.endDate.toLocaleDateString("fr-FR") : "",
          contractInfo.alertDate ? contractInfo.alertDate.toLocaleDateString("fr-FR") : "",
          contractInfo.message || "",
          latestVisit ? formatDate(latestVisit.date_visite) : "",
          latestVisit ? latestVisit.commentaire || "" : "",
          visitCount
        ];
      });

      const csvContent = [
        headers.map(csvValue).join(";"),
        ...rows.map(row => row.map(csvValue).join(";"))
      ].join("\n");

      const blob = new Blob(["\uFEFF" + csvContent], {
        type: "text/csv;charset=utf-8;"
      });

      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const date = new Date().toISOString().slice(0, 10);

      link.href = url;
      link.download = `export-crm-${currentCommercial.id}-${date}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    }

    async function refreshSelectedMagasin() {
      if (!selectedMagasin) return;

      const { data, error } = await supabase
        .from("magasins")
        .select("*")
        .eq("id", selectedMagasin.id)
        .single();

      if (!error && data) {
        selectedMagasin = data;

        const index = magasins.findIndex(m => m.id === data.id);

        if (index !== -1) {
          magasins[index] = data;
        }
      }
    }

    async function renderMagasinDetail() {
      if (!selectedMagasin) return;

      const { data: visitesData, error } = await supabase
        .from("visites")
        .select("*")
        .eq("magasin_id", selectedMagasin.id)
        .order("date_visite", { ascending: false });

      if (error) {
        app.innerHTML = `<div class="error">Erreur chargement fiche : ${escapeHTML(error.message)}</div>`;
        return;
      }

      const magasinVisites = visitesData || [];
      const contractInfo = getContractInfo(selectedMagasin.date_signature, selectedMagasin.duree_contrat);

      app.innerHTML = `
        <div class="topbar">
          <div>
            <h1>${escapeHTML(selectedMagasin.nom)}</h1>
            <p class="subtitle">${escapeHTML(currentCommercial.nom)}</p>
          </div>

          <div class="actions">
            <button class="btn-light" id="backDashboardBtn">Retour à la liste</button>
            <button class="btn-secondary" id="editStoreBtn">Modifier la fiche</button>
            <button id="addVisitBtn">+ Ajouter une visite</button>
            <button class="btn-danger" id="deleteStoreBtn">Supprimer le magasin</button>
          </div>
        </div>

        ${
          contractInfo.isExpired
            ? `<div class="alert-box alert-red">⚠️ ${escapeHTML(contractInfo.message)}</div>`
            : contractInfo.isAlert
              ? `<div class="alert-box alert-orange">⚠️ ${escapeHTML(contractInfo.message)}</div>`
              : ""
        }

        <div class="detail-layout" style="margin-top:20px;">
          <div class="card">
            <div class="photo-box">
              ${
                selectedMagasin.photo_url
                  ? `<img src="${escapeHTML(selectedMagasin.photo_url)}" alt="Photo magasin">`
                  : `Aucune photo<br>Ajoute une photo en modifiant la fiche`
              }
            </div>
          </div>

          <div class="card">
            <h2>Fiche client / magasin</h2>

            <div class="info-grid">
              <div class="info-item">
                <div class="info-label">Enseigne</div>
                <div class="info-value">${escapeHTML(selectedMagasin.enseigne || "Non renseignée")}</div>
              </div>

              <div class="info-item">
                <div class="info-label">Nom du gérant</div>
                <div class="info-value">${escapeHTML(selectedMagasin.gerant || "Non renseigné")}</div>
              </div>

              <div class="info-item">
                <div class="info-label">Adresse</div>
                <div class="info-value">${escapeHTML(selectedMagasin.adresse || "Non renseignée")}</div>
              </div>

              <div class="info-item">
                <div class="info-label">Ville</div>
                <div class="info-value">${escapeHTML(selectedMagasin.ville || "Non renseignée")}</div>
              </div>

              <div class="info-item">
                <div class="info-label">Prix de vente</div>
                <div class="info-value">${formatMoney(selectedMagasin.prix_vente)}</div>
              </div>

              <div class="info-item">
                <div class="info-label">CA HT</div>
                <div class="info-value">${formatMoney(selectedMagasin.ca)}</div>
              </div>

              <div class="info-item">
                <div class="info-label">CA EDP</div>
                <div class="info-value">${formatMoney(selectedMagasin.ca_edp)}</div>
              </div>

              <div class="info-item">
                <div class="info-label">Date de signature du contrat</div>
                <div class="info-value">${formatDate(selectedMagasin.date_signature)}</div>
              </div>

              <div class="info-item">
                <div class="info-label">Durée du contrat</div>
                <div class="info-value">${getContractDuration(selectedMagasin.duree_contrat)} an(s)</div>
              </div>

              <div class="info-item">
                <div class="info-label">Fin du contrat</div>
                <div class="info-value">${
                  contractInfo.endDate
                    ? contractInfo.endDate.toLocaleDateString("fr-FR")
                    : "Non renseigné"
                }</div>
              </div>

              <div class="info-item">
                <div class="info-label">Alerte renouvellement</div>
                <div class="info-value">${
                  contractInfo.alertDate
                    ? contractInfo.alertDate.toLocaleDateString("fr-FR")
                    : "Non renseigné"
                }</div>
              </div>

              <div class="info-item">
                <div class="info-label">Statut du contrat</div>
                <div class="info-value">${escapeHTML(contractInfo.message)}</div>
              </div>

              <div class="info-item">
                <div class="info-label">Nombre de visites</div>
                <div class="info-value">${magasinVisites.length}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:20px;">
          <h2>Historique des visites</h2>

          <div class="visit-list">
            ${
              magasinVisites.length === 0
                ? `<div class="empty">Aucune visite enregistrée pour ce magasin.</div>`
                : magasinVisites.map(v => `
                  <div class="visit-item">
                    <div class="visit-date">${formatDate(v.date_visite)}</div>
                    <div>${escapeHTML(v.commentaire || "Aucun commentaire")}</div>
                  </div>
                `).join("")
            }
          </div>
        </div>
      `;

      document.getElementById("backDashboardBtn").addEventListener("click", loadDashboard);
      document.getElementById("editStoreBtn").addEventListener("click", () => openStoreModal(selectedMagasin));
      document.getElementById("addVisitBtn").addEventListener("click", openVisitModal);
      document.getElementById("deleteStoreBtn").addEventListener("click", deleteSelectedMagasin);
    }

    function openStoreModal(magasin = null) {
      editingMagasin = magasin;

      document.getElementById("storeModalTitle").textContent = magasin ? "Modifier la fiche client" : "Ajouter une fiche client";

      document.getElementById("storeName").value = magasin?.nom || "";
      document.getElementById("storeEnseigne").value = magasin?.enseigne || "";
      document.getElementById("storeGerant").value = magasin?.gerant || "";
      document.getElementById("storeCity").value = magasin?.ville || "";
      document.getElementById("storeAddress").value = magasin?.adresse || "";
      document.getElementById("storePrice").value = magasin?.prix_vente || "";
      document.getElementById("storeCA").value = magasin?.ca || "";
      document.getElementById("storeCAEDP").value = magasin?.ca_edp || "";
      document.getElementById("storeSignature").value = magasin?.date_signature || "";
      document.getElementById("storeContractDuration").value = getContractDuration(magasin?.duree_contrat);
      document.getElementById("storePhoto").value = "";
      document.getElementById("storeFormMessage").innerHTML = "";

      document.getElementById("storeModal").style.display = "flex";
    }

    window.closeStoreModal = function() {
      document.getElementById("storeModal").style.display = "none";
      editingMagasin = null;
    };

    async function uploadPhoto(file) {
      if (!file) return null;

      const cleanName = file.name
        .toLowerCase()
        .replaceAll(" ", "-")
        .replace(/[^a-z0-9.-]/g, "");

      const path = `magasins/${Date.now()}-${cleanName}`;

      const { error: uploadError } = await supabase.storage
        .from("photos-magasins")
        .upload(path, file, {
          cacheControl: "3600",
          upsert: true
        });

      if (uploadError) throw uploadError;

      const { data } = supabase.storage
        .from("photos-magasins")
        .getPublicUrl(path);

      return {
        photo_url: data.publicUrl,
        photo_path: path
      };
    }

    document.getElementById("storeForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const message = document.getElementById("storeFormMessage");
      message.innerHTML = `<div class="success">Enregistrement en cours...</div>`;

      try {
        const file = document.getElementById("storePhoto").files[0];
        const uploaded = await uploadPhoto(file);

        const payload = {
          commercial_id: currentCommercial.id,
          nom: document.getElementById("storeName").value.trim(),
          enseigne: document.getElementById("storeEnseigne").value.trim() || null,
          gerant: document.getElementById("storeGerant").value.trim() || null,
          ville: document.getElementById("storeCity").value.trim() || null,
          adresse: document.getElementById("storeAddress").value.trim() || null,
          prix_vente: document.getElementById("storePrice").value || null,
          ca: document.getElementById("storeCA").value || null,
          ca_edp: document.getElementById("storeCAEDP").value || null,
          date_signature: document.getElementById("storeSignature").value || null,
          duree_contrat: getContractDuration(document.getElementById("storeContractDuration").value),
          updated_at: new Date().toISOString()
        };

        if (uploaded) {
          payload.photo_url = uploaded.photo_url;
          payload.photo_path = uploaded.photo_path;
        }

        if (editingMagasin) {
          const { error } = await supabase
            .from("magasins")
            .update(payload)
            .eq("id", editingMagasin.id);

          if (error) throw error;

          selectedMagasin = { ...selectedMagasin, ...payload };
          message.innerHTML = `<div class="success">Fiche modifiée avec succès.</div>`;
        } else {
          const { data, error } = await supabase
            .from("magasins")
            .insert([payload])
            .select()
            .single();

          if (error) throw error;

          selectedMagasin = data;
          message.innerHTML = `<div class="success">Fiche ajoutée avec succès.</div>`;
        }

        setTimeout(async () => {
          closeStoreModal();

          if (selectedMagasin) {
            await refreshSelectedMagasin();
            renderMagasinDetail();
          } else {
            loadDashboard();
          }
        }, 600);

      } catch (error) {
        console.error(error);
        message.innerHTML = `<div class="error">Erreur : ${escapeHTML(error.message)}</div>`;
      }
    });

    function openVisitModal() {
      document.getElementById("visitDate").value = "";
      document.getElementById("visitComment").value = "";
      document.getElementById("visitFormMessage").innerHTML = "";
      document.getElementById("visitModal").style.display = "flex";
    }

    window.closeVisitModal = function() {
      document.getElementById("visitModal").style.display = "none";
    };

    document.getElementById("visitForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const message = document.getElementById("visitFormMessage");
      message.innerHTML = `<div class="success">Ajout de la visite...</div>`;

      const payload = {
        magasin_id: selectedMagasin.id,
        date_visite: document.getElementById("visitDate").value,
        commentaire: document.getElementById("visitComment").value.trim() || null
      };

      const { error } = await supabase
        .from("visites")
        .insert([payload]);

      if (error) {
        message.innerHTML = `<div class="error">Erreur : ${escapeHTML(error.message)}</div>`;
        return;
      }

      message.innerHTML = `<div class="success">Visite ajoutée avec succès.</div>`;

      setTimeout(() => {
        closeVisitModal();
        renderMagasinDetail();
      }, 500);
    });

    async function deleteSelectedMagasin() {
      if (!selectedMagasin) return;

      const confirmation = confirm(
        `Tu es sûr de vouloir supprimer le magasin "${selectedMagasin.nom}" ?\n\nIl ne sera plus visible dans le CRM.`
      );

      if (!confirmation) return;

      const { error } = await supabase
        .from("magasins")
        .update({
          archive: true,
          updated_at: new Date().toISOString()
        })
        .eq("id", selectedMagasin.id);

      if (error) {
        alert("Erreur lors de la suppression : " + error.message);
        return;
      }

      alert("Magasin supprimé du CRM.");

      selectedMagasin = null;
      await loadDashboard();
    }

    renderHome();
  </script>
